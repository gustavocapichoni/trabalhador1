name: Bot Instagram Automático

on:
  workflow_dispatch:
    inputs:
      tipo_post:
        description: 'Tipo de postagem para rodar manualmente'
        required: true
        type: choice
        options:
          - story
          - story_manha
          - story_tarde
          - carousel
          - reels
          - pexels_story
          - reels_noite
          - pexels_story_noite
          - reels_conquistador
          - analytics
          - weekly_report
          - test

  schedule:
    - cron: '0 7 * * *'    # 04:00 BRT - Analytics
    - cron: '30 7 * * *'   # 04:30 BRT - Cruzamento de dados (Segunda)
    - cron: '0 9 * * *'    # 06:00 BRT - Reels matinal
    - cron: '0 10 * * *'   # 07:00 BRT - Pexels story
    - cron: '0 11 * * *'   # 08:00 BRT - Weekly report (Segunda)
    - cron: '0 12 * * *'   # 09:00 BRT - Carousel
    - cron: '0 15 * * *'   # 12:00 BRT - Reels almoço
    - cron: '0 20 * * *'   # 17:00 BRT - Story tarde
    - cron: '0 21 * * *'   # 18:00 BRT - Reels noite
    - cron: '0 22 * * *'   # 19:00 BRT - Pexels noite
    - cron: '0 1 * * *'    # 22:00 BRT - Reels conquistador

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências (APT)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Corrigir política de segurança do ImageMagick
        run: |
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>/<policy domain="path" rights="read|write" pattern="@*"\/>/' /etc/ImageMagick-6/policy.xml || true

      - name: Instalar Dependências (PIP)
        run: pip install -r requirements.txt

      - name: Executar Bot (Agendado)
        if: github.event_name == 'schedule'
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python rodar_via_cron.py

      - name: Executar Bot (Manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python rodar_via_cron.py --manual ${{ github.event.inputs.tipo_post }}

      - name: Salvar Estado do Bot
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add estado.json analytics/dados/ || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: atualizar estado.json [skip ci]"
          git pull --rebase origin main || true
          git push

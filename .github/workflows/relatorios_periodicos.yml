name: Relatorios Periodicos

on:
  # Disparo manual (para testar qualquer relatório a qualquer hora)
  workflow_dispatch:
    inputs:
      tipo_relatorio:
        description: 'Tipo de relatorio a gerar'
        required: true
        type: choice
        options:
          - mensal
          - trimestral
          - semestral
          - anual

  schedule:
    # Mensal: todo dia 1 de cada mes as 08:00 UTC (05:00 BRT)
    - cron: '0 8 1 * *'

    # Trimestral: dia 1 de janeiro, abril, julho e outubro as 08:30 UTC (05:30 BRT)
    - cron: '30 8 1 1,4,7,10 *'

    # Semestral: dia 1 de janeiro e julho as 09:00 UTC (06:00 BRT)
    - cron: '0 9 1 1,7 *'

    # Anual: dia 1 de janeiro as 09:30 UTC (06:30 BRT)
    - cron: '30 9 1 1 *'

permissions:
  contents: read

jobs:
  relatorio-periodico:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependencias
        run: pip install -r requirements.txt

      # -------------------------------------------------------
      # Disparo via cron automatico:
      # O GitHub nao passa o mes diretamente, entao o script
      # Python detecta qual relatorio rodar com base na data.
      # -------------------------------------------------------
      - name: Determinar e Executar Relatorio (Cron Automatico)
        if: github.event_name == 'schedule'
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          SMTP_EMAIL:       ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL:     ${{ secrets.NOTIFY_EMAIL }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          python - <<'EOF'
          import subprocess, datetime

          now   = datetime.datetime.utcnow()
          mes   = now.month
          dia   = now.day
          hora  = now.hour

          if dia != 1:
              print(f"Hoje nao e dia 1 (dia={dia}). Nenhum relatorio necessario.")
              exit(0)

          # Anual: janeiro, hora 09:30 UTC
          if mes == 1 and hora == 9:
              print("Rodando: ANUAL")
              subprocess.run(["python", "core/reports/periodic.py", "anual"], check=True)

          # Semestral: janeiro e julho, hora 09:00 UTC
          if mes in (1, 7) and hora == 9:
              print("Rodando: SEMESTRAL")
              subprocess.run(["python", "core/reports/periodic.py", "semestral"], check=True)

          # Trimestral: jan, abr, jul, out, hora 08:30 UTC
          if mes in (1, 4, 7, 10) and hora == 8:
              print("Rodando: TRIMESTRAL")
              subprocess.run(["python", "core/reports/periodic.py", "trimestral"], check=True)

          # Mensal: todo dia 1, hora 08:00 UTC
          if hora == 8:
              print("Rodando: MENSAL")
              subprocess.run(["python", "core/reports/periodic.py", "mensal"], check=True)

          EOF

      # -------------------------------------------------------
      # Disparo manual: usa o tipo escolhido no menu
      # -------------------------------------------------------
      - name: Executar Relatorio (Manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          SMTP_EMAIL:       ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL:     ${{ secrets.NOTIFY_EMAIL }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python core/reports/periodic.py ${{ github.event.inputs.tipo_relatorio }}
